# ==============================
# PostgreSQL Database Connection
# ==============================
spring.datasource.url=jdbc:postgresql://ep-still-wildflower-a1580bi8-pooler.ap-southeast-1.aws.neon.tech:5432/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# HikariCP Connection Pool Settings (FIX SLOW STARTUP)
# ==============================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ==============================
# JPA / Hibernate Settings
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# Server
# ==============================
server.port=8081
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# ==============================
# Disable Unnecessary Features (SPEED UP STARTUP)
# ==============================
spring.jmx.enabled=false
spring.main.lazy-initialization=false

# ==============================
# Email Configuration (for forgot password feature)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000