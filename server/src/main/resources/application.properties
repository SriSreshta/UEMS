# ==============================
# PostgreSQL Database Connection
# ==============================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==============================
# Default User Passwords
# ==============================
default.admin.password=${ADMIN_PASSWORD}
default.faculty.password=${FACULTY_PASSWORD}
default.student.password=${STUDENT_PASSWORD}

# ==============================
# HikariCP Connection Pool Settings (FIX SLOW STARTUP)
# ==============================
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ==============================
# JPA / Hibernate Settings
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# Server
# ==============================
server.port=8081
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=20s

# ==============================
# Disable Unnecessary Features (SPEED UP STARTUP)
# ==============================
spring.jmx.enabled=false
spring.main.lazy-initialization=false

# ==============================
# Email Configuration (for forgot password feature)
# ==============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000

# ==============================
# App Configuration
# ==============================
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Multipart File Upload Settings
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB
